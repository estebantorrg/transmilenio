name: Deploy relay function

# Builds the OCI Function in scripts/oci-func and deploys it to sa-bogota-1,
# replacing the manual Cloud Shell `fn deploy`. Build + push with plain Docker,
# update the function with the OCI CLI (no Fn CLI / oracle provider). Runs on any
# push touching the function bundle, or manually via the Actions tab.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   OCI_PRIVATE_KEY   — PEM private key for the transmi-ci user (multi-line)
#   OCI_USER_OCID     — OCID of the transmi-ci user
#   OCI_FINGERPRINT   — API key fingerprint for that key
#   OCI_TENANCY_OCID  — tenancy OCID (also the root compartment)
#   OCIR_USERNAME     — <namespace>/Default/transmi-ci
#   OCIR_TOKEN        — OCIR auth token for the transmi-ci user
#   OCIR_NAMESPACE    — object-storage namespace (OCIR registry owner)

on:
  push:
    branches: [main]
    paths:
      - 'scripts/oci-func/**'
      - '.github/workflows/deploy-relay.yml'
  workflow_dispatch:

env:
  OCI_REGION: sa-bogota-1
  OCIR_REGISTRY_HOST: bog.ocir.io
  FN_APP: transmi-relay
  FN_NAME: transmi-relay
  SUPPRESS_LABEL_WARNING: "True"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Write OCI config
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 ~/.oci/config
          # Fail early + clearly if the key/config is wrong.
          openssl rsa -in ~/.oci/key.pem -noout -check
          oci iam region list --query 'data[0].name' --raw-output

      - name: Docker login to OCIR
        env:
          OCIR_TOKEN: ${{ secrets.OCIR_TOKEN }}
          OCIR_USERNAME: ${{ secrets.OCIR_USERNAME }}
        run: printf '%s' "$OCIR_TOKEN" | docker login "$OCIR_REGISTRY_HOST" -u "$OCIR_USERNAME" --password-stdin

      - name: Build & push image
        working-directory: scripts/oci-func
        env:
          OCIR_NAMESPACE: ${{ secrets.OCIR_NAMESPACE }}
        run: |
          TAG="${GITHUB_SHA::12}"
          IMG="$OCIR_REGISTRY_HOST/$OCIR_NAMESPACE/$FN_APP/$FN_NAME:$TAG"
          docker build -t "$IMG" .
          docker push "$IMG"
          echo "RELAY_IMG=$IMG" >> "$GITHUB_ENV"

      - name: Update function image
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          APP_ID=$(oci fn application list -c "$OCI_TENANCY_OCID" --display-name "$FN_APP" --query 'data[0].id' --raw-output)
          FN_ID=$(oci fn function list --application-id "$APP_ID" --display-name "$FN_NAME" --query 'data[0].id' --raw-output)
          echo "Updating function $FN_ID -> $RELAY_IMG"
          oci fn function update --function-id "$FN_ID" --image "$RELAY_IMG" --force
          echo "Done."
