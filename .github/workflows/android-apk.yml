name: Android APK

# Builds the TransMilenio Explorer Android app (mobile/) and publishes the APK.
# - Push a tag like v1.0.0  -> builds + attaches the APK to a GitHub Release.
# - Manual run (workflow_dispatch) -> builds + uploads the APK as a run artifact.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # needed to create/attach the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true # master_catalog.json (Git LFS) — the mobile bundle is generated from it

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # Root workspace holds the web client (client/) the shell wraps.
      - name: Install web deps
        run: npm ci

      # Capacitor CLI + Android platform bridge live in mobile/.
      - name: Install mobile deps
        working-directory: mobile
        run: npm install

      # Regenerates the APK-bundled offline data from the committed server data,
      # builds client/ into mobile/www, then copies into the Android project. The
      # native app hits the official hosts directly (spec §5.2.1b) — no API base baked.
      - name: Build web + sync Android
        working-directory: mobile
        run: npm run sync

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk \
             "dist/transmilenio-explorer-${GITHUB_REF_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: transmilenio-explorer-apk
          path: dist/*.apk

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
