<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TransMilenio Explorer</title>
  <meta name="description" content="Explora todas las rutas de TransMilenio y SITP en Bogotá. Visualiza estaciones, paraderos y trazados en un mapa interactivo." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <h2 class="loading-title">TransMilenio Explorer</h2>
      <p class="loading-subtitle" id="loading-status">Conectando con Bogotá...</p>
    </div>
  </div>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/>
            <circle cx="7" cy="18" r="2"/><path d="M9 18h5"/><circle cx="16" cy="18" r="2"/>
          </svg>
        </div>
        <div>
          <h1 class="brand-title">TransMilenio</h1>
          <p class="brand-subtitle">Explorer</p>
        </div>
      </div>
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>

    <!-- Search -->
    <div class="search-container">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="search-input" class="search-input" placeholder="Buscar ruta... (ej: G47, B12, 661)" autocomplete="off" />
      <button id="search-clear" class="search-clear hidden" aria-label="Clear search">✕</button>
    </div>

    <!-- Layer Toggles -->
    <div class="layer-toggles">
      <div class="layer-toggles-title">Capas del mapa</div>
      <label class="toggle-item" id="toggle-troncal">
        <input type="checkbox" checked data-layer="troncal" />
        <span class="toggle-check check-troncal"></span>
        <div class="toggle-text">
          <div class="toggle-label">Rutas troncales</div>
          <div class="toggle-desc">Líneas principales de TransMilenio</div>
        </div>
        <span class="toggle-count" id="count-troncal">—</span>
      </label>
      <label class="toggle-item" id="toggle-zonal">
        <input type="checkbox" data-layer="zonal" />
        <span class="toggle-check check-zonal"></span>
        <div class="toggle-text">
          <div class="toggle-label">Rutas zonales</div>
          <div class="toggle-desc">Buses SITP que circulan por barrios</div>
        </div>
        <span class="toggle-count" id="count-zonal">—</span>
      </label>
      <label class="toggle-item" id="toggle-stations">
        <input type="checkbox" checked data-layer="stations" />
        <span class="toggle-check check-stations"></span>
        <div class="toggle-text">
          <div class="toggle-label">Estaciones troncales</div>
          <div class="toggle-desc">Paradas del sistema troncal</div>
        </div>
        <span class="toggle-count" id="count-stations">—</span>
      </label>
      <label class="toggle-item" id="toggle-stops">
        <input type="checkbox" data-layer="stops" />
        <span class="toggle-check check-stops"></span>
        <div class="toggle-text">
          <div class="toggle-label">Paraderos zonales</div>
          <div class="toggle-desc">Paradas de buses SITP en calle</div>
        </div>
        <span class="toggle-count" id="count-stops">—</span>
      </label>
    </div>

    <!-- Route List -->
    <div class="route-list-header">
      <h3>Rutas</h3>
      <span class="route-list-count" id="route-list-count"></span>
    </div>
    <div id="route-list" class="route-list"></div>

    <!-- Route Detail Panel (shown when a route is selected) -->
    <div id="route-detail" class="route-detail hidden">
      <button id="route-detail-close" class="route-detail-close">← Volver</button>
      <div id="route-detail-content"></div>
    </div>
  </aside>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
